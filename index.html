<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Sentence — Almanack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f1e6c8;
    --ink: #2b2013;
    --ink-soft: #6e5a3a;
    --brass: #9c6b2e;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 18px;
    font-family: "EB Garamond", Georgia, serif;
    background: var(--parchment);
    background-image:
      radial-gradient(ellipse at 18% 12%, rgba(110,90,58,0.10), transparent 40%),
      radial-gradient(ellipse at 85% 88%, rgba(110,90,58,0.10), transparent 45%),
      radial-gradient(ellipse at 92%  8%, rgba(156,107,46,0.07), transparent 35%);
  }

  .leaf {
    max-width: 560px;
    width: 100%;
    padding: 30px 32px 28px;
    border: 1px solid rgba(156,107,46,0.55);
    box-shadow: 0 0 0 7px var(--parchment), 0 0 0 8px rgba(156,107,46,0.4);
    background: rgba(255,252,240,0.25);
    opacity: 0;
    animation: rise 0.7s ease forwards;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .flourish {
    color: var(--brass);
    font-size: 15px;
    letter-spacing: 0.3em;
    text-align: center;
    margin-bottom: 18px;
  }

  /* ── header: date (left) | titles (right) ── */
  .header-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  /* left — date */
  .date-block {
    text-align: left;
    line-height: 1.3;
  }

  .weekday {
    font-family: "IM Fell English SC", "EB Garamond", serif;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: var(--ink-soft);
  }

  .date-line {
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
    margin: 3px 0 2px;
  }

  .anno {
    font-family: "IM Fell English SC", serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
  }

  /* right — phase / subtitle / keywords */
  .title-block {
    text-align: right;
    line-height: 1.35;
  }

  /* Phase — large, small caps, brass */
  .phase {
    font-family: "IM Fell English SC", "EB Garamond", serif;
    font-size: 16px;
    letter-spacing: 0.08em;
    color: var(--brass);
    display: block;
    margin-bottom: 3px;
  }

  /* Subtitle — italic, ink, mid-size */
  .subtitle {
    font-family: "EB Garamond", Georgia, serif;
    font-style: italic;
    font-size: 13.5px;
    color: var(--ink);
    display: block;
    margin-bottom: 4px;
    line-height: 1.4;
  }

  /* Keywords — small caps, soft, spaced */
  .keywords {
    font-family: "IM Fell English SC", "EB Garamond", serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    display: block;
    line-height: 1.5;
  }

  /* ── divider ── */
  .divider {
    border: none;
    border-top: 1px solid rgba(156,107,46,0.4);
    margin: 0 0 18px;
  }

  /* ── paragraph ── */
  .paragraph {
    font-family: "IM Fell English", Georgia, serif;
    font-style: italic;
    font-size: clamp(17px, 3.5vw, 21px);
    line-height: 1.6;
    color: var(--ink);
    text-align: left;
    margin: 0 0 16px;
  }

  .paragraph::before { content: "\201C"; color: var(--brass); }
  .paragraph::after  { content: "\201D"; color: var(--brass); }

  .flourish.bottom { margin-bottom: 0; margin-top: 4px; }

  @media (prefers-reduced-motion: reduce) {
    .leaf { animation: none; opacity: 1; }
  }
</style>
</head>

  <hr class="divider">

  <div class="flourish bottom">&#10086;</div>
</div>

  // ------------------------------------------------------------------
  // EPOCH — Day 1. Do not change once deployed.
  // ------------------------------------------------------------------
  const EPOCH = new Date(2026, 5, 14); // June 14, 2026

  function getTodayIndex() {
    const today = new Date();
    const d0 = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const d1 = new Date(EPOCH.getFullYear(), EPOCH.getMonth(), EPOCH.getDate());
    const diff = Math.floor((d0 - d1) / 86400000);
    const n = days.length;
    return ((diff % n) + n) % n;
  }

  const idx   = getTodayIndex();
  const today = new Date();
  const entry = days[idx];

  const MONTHS   = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function ordinal(n) {
    const s = ["th","st","nd","rd"], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  document.getElementById("weekday").textContent  = WEEKDAYS[today.getDay()];
